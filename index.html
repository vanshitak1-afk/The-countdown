<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Experience 💖</title>
<style>
body { margin:0; font-family:"Times New Roman",serif; }
*{font-family:"Times New Roman",serif !important;}

.section{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}

#section1{background:black;color:white;}
#spotlight{display:none;background:radial-gradient(circle at center, rgba(255,255,255,0.3), rgba(142,68,173,0.25), black);color:#a569bd;}
#section2{display:none;background:#3b0a0a;color:gold;position:relative;overflow:hidden;}
#section4{display:none;background:#7b3fbf;color:white;position:relative;}
#section5{display:none;background:#2d0036;color:white;}

button{background:#8e44ad;color:white;border:none;padding:14px 26px;border-radius:25px;margin:10px;font-size:16px;cursor:pointer;}

#section1 h3{font-size:28px;margin-bottom:20px;}
#spotlight h2{font-size:36px;}

.countdown{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;z-index:2;}
.box{border:1px solid gold;padding:12px 14px;border-radius:12px;min-width:60px;box-shadow:0 0 12px gold;font-size:18px;}

#coming{letter-spacing:2px;font-weight:bold;}

.polaroid-row{position:absolute;width:100%;display:flex;justify-content:center;gap:10px;}
.top{top:10%;}
.mid{top:40%;z-index:1;}
.bot{bottom:10%;}
.polaroid{width:70px;height:90px;background:white;box-shadow:0 4px 8px rgba(0,0,0,0.5);}

#giftBox{font-size:90px;cursor:pointer;display:none;margin-top:30px;}

.grid{display:grid;grid-template-columns:repeat(2,150px);gap:25px;}
.gift{width:150px;height:150px;background:linear-gradient(145deg,#d4af37,#ffd700);display:flex;justify-content:center;align-items:center;font-size:45px;border-radius:20px;box-shadow:0 0 15px rgba(255,215,0,0.6);}

.cake{font-size:130px;}
#flame{font-size:45px;display:block;transition:0.5s;}
#finalText{font-size:40px;display:none;margin-top:20px;}
</style>
</head>

<body>

<div id="section1" class="section">
<h3>Turn the lights on</h3>
<button onclick="lightOn()">Turn On ✨</button>
</div>

<div id="spotlight" class="section">
<h2>Are you ready for this?</h2>
<button onclick="toSection2()">YESSSS</button>
</div>

<div id="section2" class="section" onclick="attemptReveal()">
<div id="row1" class="polaroid-row top"></div>
<div id="row2" class="polaroid-row mid"></div>
<div id="row3" class="polaroid-row bot"></div>

<div class="countdown">
<div class="box" id="d">00</div>
<div class="box" id="h">00</div>
<div class="box" id="m">00</div>
<div class="box" id="s">00</div>
</div>

<p id="coming">SOMETHING SPECIAL IS COMING</p>
<div id="giftBox" onclick="event.stopPropagation(); toSection4()">🎁</div>
</div>

<div id="section4" class="section">
<div class="grid" id="grid"></div>
</div>

<div id="section5" class="section">
<div class="cake">🎂<span id="flame">🕯️</span></div>
<button onclick="blowCandle()">Blow Candle ✨</button>
<div id="finalText">HAPPY BIRTHDAY 💖</div>
</div>

<script>
const section1 = document.getElementById("section1");
const spotlight = document.getElementById("spotlight");
const section2 = document.getElementById("section2");
const section4 = document.getElementById("section4");
const section5 = document.getElementById("section5");
const grid = document.getElementById("grid");

function lightOn(){section1.style.display="none";spotlight.style.display="flex";}
function toSection2(){spotlight.style.display="none";section2.style.display="flex";}
function toSection4(){section2.style.display="none";section4.style.display="flex";createGifts();}
function toSection5(){section4.style.display="none";section5.style.display="flex";}

function createRow(id){
  let r=document.getElementById("row"+id);
  if(r.children.length===0){
    for(let i=0;i<5;i++){
      let d = document.createElement("div");
      d.className = "polaroid";

      let img = document.createElement("image");
      img.src = "image" + ((id-1)*5 + i + 1) + ".png";
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "cover";

      d.appendChild(imgage);
      r.appendChild(d);
    }
  }
}

const startDate = new Date("2026-03-22T23:59:00");

function attemptReveal(){
  const now = new Date();
  if(now < startDate) return;

  const hoursPassed = (now - startDate)/(1000*60*60);

  if(hoursPassed >= 9) createRow(1);
  if(hoursPassed >= 33) createRow(2);
  if(hoursPassed >= 57) createRow(3);

  if(hoursPassed >= 60){
    document.getElementById("row1").innerHTML="";
    document.getElementById("row2").innerHTML="";
    document.getElementById("row3").innerHTML="";
    document.getElementById("giftBox").style.display="block";
  }
}

const targetDate = new Date("2026-03-25T23:59:00");
setInterval(()=>{
  const now = new Date();
  let diff = targetDate - now;
  if(diff < 0) diff = 0;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);
  const s = Math.floor((diff/1000)%60);

  document.getElementById("d").innerText=d;
  document.getElementById("h").innerText=h;
  document.getElementById("m").innerText=m;
  document.getElementById("s").innerText=s;
},1000);

const cats=["😺","😸","😹","😻","😼","😽"];

function createGifts(){
  if(grid.children.length>0)return;
  for(let i=0;i<6;i++){
    let g=document.createElement("div");
    g.className="gift";
    g.innerText="🎁";
    g.onclick=()=>openGift(g,i);
    grid.appendChild(g);
  }
}

function openGift(el,i){
  if(el.dataset.o)return;
  el.dataset.o=1;
  if(i===5){toSection5();return;}
  el.innerText=cats[i];
}

function blowCandle(){
  const flame = document.getElementById("flame");
  const text = document.getElementById("finalText");

  flame.style.opacity="0";
  setTimeout(()=>{
    flame.innerText="";
    text.style.display="block";
  },500);
}
</script>

</body>
</html>
